<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#07070e"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt-g" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow-f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg-g)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(124,58,237,0.25)" stroke-width="0.75"/>
  <!-- Violet halo under bolt -->
  <ellipse cx="16" cy="21" rx="9" ry="6" fill="url(#halo)"/>
  <!-- Fork (left tine) -->
  <path d="M10 6 L10 12 Q10 14 12 14 L12 26" stroke="rgba(245,158,11,0.45)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Fork (right tine) -->
  <path d="M13 6 L13 12" stroke="rgba(245,158,11,0.45)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Knife (right side) -->
  <path d="M20 6 Q23 8 22 12 L21 26" stroke="rgba(245,158,11,0.45)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Central bolt — main icon -->
  <path d="M17.5 5 L12 16.5 H16.2 L14.5 27 L22 15 H17.8 Z" fill="url(#bolt-g)" filter="url(#glow-f)"/>
  <!-- Bolt inner highlight -->
  <path d="M17.5 5 L13.5 14.5 H16.8 L17.5 5Z" fill="rgba(255,255,255,0.2)"/>
</svg>